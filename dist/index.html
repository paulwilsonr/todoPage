<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>

<body>
    <nav>
        <img class="icon whiteIcon openMenuButton pointer"  src="../src/assets/menu.png" alt="Open Menu">
        <h1 id="mainTitle"></h1>
        <img class="icon whiteIcon openNewItemMenu pointer" src="../src/assets/more.png" alt="Create new to-do item">
    </nav>
    <div class="newItemMenu hidden">
        <p id="openNewTaskMenu" class="pointer">New Task</p>
        <p id="openNewProjectMenu" class="pointer">New Project</p>
    </div>
    <main>
        <div class="sideMenu">
            <div class="dueDateSorterContainer">
                <div class="sideMenuOption sideMenuTitle">
                    <h2>Due</h2>
            
                </div>
                <div class="dueDateSorter sideMenuOption">
                    <p class="pointer" id="dueToday">Today</p>
    
                </div>
                <div class="dueDateSorter sideMenuOption">
                    <p class="pointer" id="dueTomorrow">Tomorrow</p>
                
                </div>
                <div class="dueDateSorter sideMenuOption">
                    <p class="pointer" id="dueThisWeek">This Week</p>
                    
                </div>
                <div class="dueDateSorter sideMenuOption">
                    <p class="pointer" id="dueAll">All Tasks</p>
                    
                </div>
            </div>
            <div class="projectSorterContainer">
                <div class="sideMenuOption sideMenuTitle">
                    <h2>Projects</h2>
                    <img class="icon pointer" id="sideMenuProjectMenu" src="../src/assets/more.png" alt="Add new project">
                </div>
            </div>
        </div>
        <div class="newMenu hidden" id="newTask">
            <div class="menuHeader">
            <h2 class="menuHeaderText">Create New Task</h2>
            <img class="smallIcon whiteIcon end pointer" id="closeNewTaskMenu" src="../src/assets/close.png" alt="Close new task menu">
            </div>
            <form id="createTask">
                <label for="title">New Task Name:</label>
                <input class="justifyLeft" type="text" name="title" id="title">
                <label for="date">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="date" >
                <label for="description">Task Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="description">
                <label for="priority">Important:</label>
                <input class="justifyLeft" type="checkbox" name="priority" id="priority" value="true">
                <label for="checklist">Checklist:</label>
                <div id="checklistContainer">
                <div>
                    <input class="justifyLeft checklistInput" type="text" name="checklist" id="checklist">
                    <img src="../src/assets/more.png" alt="Add more checklist items" class="smallIcon end pointer AddChecklist">
                    </div>
                
                </div>
                <input type="submit" value="Create" class="button submitButton" id="task">
            </form>
        </div>
        
        <div id="newProject" class="newMenu hidden">
            <div class="menuHeader">
            <h2 class="menuHeaderText">Create New Project</h2>
            <img class="smallIcon whiteIcon end pointer" id="closeNewProjectMenu" src="../src/assets/close.png" alt="Close new task menu">
            </div>
            <form id="createProject">
                <label for="title">New Project Name:</label>
                <input class="justifyLeft" type="text" name="title" id="title">
                <label for="date">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="date" >
                <label for="description">Project Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="description">
                <input type="submit" value="Create" class="button">
            </form>
        </div>
        <div class="taskContainer">
            
        </div>
    </main>
</body>

<script src="./main.js"></script>

</html>
