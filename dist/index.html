<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>

<body>
    <nav>
        <img class="icon whiteIcon openMenuButton pointer" src="../src/assets/menu.png" alt="Open Menu">
        <h1 id="mainTitle"></h1>
        <img class="icon whiteIcon pointer" id="openNewItemMenu" src="../src/assets/more.png" alt="Create new to-do item">
    </nav>
    <div class="newItemMenu hidden">
        <p id="openNewTaskMenu" class="pointer">New Task</p>
        <p id="openNewProjectMenu" class="pointer">New Project</p>
    </div>
    <main>
        <div class="sideMenu">
            <div class="projectSorterContainer">
                <div class="sideMenuOption sideMenuTitle">
                    <h2>Projects</h2>
                    <img class="icon pointer" id="sideMenuProjectMenu" src="../src/assets/more.png"
                        alt="Add new project">
                </div>
            </div>
            <div id="tasksSideMenuContainer">
                <div class="sideMenuOption sideMenuTitle">
                    <h2>Tasks</h2>
                    <img src="../src/assets/more.png" alt="Add new task" class="icon pointer" id="sideMenuNewTasksMenu">
                </div>
                
            </div>
        </div>
        <div class="newMenu hidden" id="newTask">
            <div class="menuHeader">
                <h2 class="menuHeaderText">Create New Task</h2>
                <img class="smallIcon whiteIcon end pointer" id="closeNewTaskMenu" src="../src/assets/close.png"
                    alt="Close new task menu">
            </div>
            <form id="createTask" class="taskForm">
                <label for="title" id="titleLabel">New Task Name:</label>
                <input class="justifyLeft" type="text" name="title" id="title">
                <label for="date">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="date">
                <label for="description">Task Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="description">
                <label for="priority">Important:</label>
                <input class="justifyLeft" type="checkbox" name="priority" id="priority">
                <label for="checklist">Checklist:</label>
                <div id="checklistContainer">
                    <div class="checklistItem">
                        <input class="justifyLeft checklistInput" type="text" name="checklist" id="checklist">
                        <img src="../src/assets/more.png" alt="Add more checklist items"
                            class="smallIcon end pointer AddChecklist" id="addChecklist">
                    </div>

                </div>
                <input type="submit" value="Create" class="button submitButton hoverButton" id="task">
            </form>
        </div>

        <div class="newMenu hidden" id="editTask">
            <div class="menuHeader">
                <h2 class="menuHeaderTextEdit">Edit Task:</h2>
                <img class="smallIcon whiteIcon end pointer" id="closeEditTaskMenu" src="../src/assets/close.png"
                    alt="Close edit task menu">
            </div>
            <form id="editTaskForm" class="taskForm">
                <label for="editTitle" id="editTitleLabel">Task Name:</label>
                <input class="justifyLeft" type="text" name="title" id="editTitle">
                <label for="editDate">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="editDate">
                <label for="editDescription">Task Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="editDescription">
                <label for="editPriority">Important:</label>
                <input class="justifyLeft" type="checkbox" name="priority" id="editPriority">
                <label for="editChecklist">Checklist:</label>
                <div id="editChecklistContainer">
                    <div class="checklistItem">
                        <input class="justifyLeft editChecklistInput checklistInput" type="text" name="checklist"
                            id="editChecklist">
                        <img src="../src/assets/more.png" alt="Add more checklist items"
                            class="smallIcon end pointer AddChecklist" id="addEditChecklist">
                    </div>

                </div>
                <input type="submit" value="Edit Task" class="button submitButton hoverButton" id="task">
            </form>
        </div>

        <div id="newProject" class="newMenu hidden">
            <div class="menuHeader">
                <h2 class="menuHeaderText">Create New Project</h2>
                <img class="smallIcon whiteIcon end pointer" id="closeNewProjectMenu" src="../src/assets/close.png"
                    alt="Close new task menu">
            </div>
            <form id="createProject">
                <label for="title">New Project Name:</label>
                <input class="justifyLeft" type="text" name="title" id="title">
                <label for="date">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="date">
                <label for="description">Project Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="description">
                <input type="submit" value="Create" class="button hoverButton">
            </form>
        </div>
        <div id="editProject" class="newMenu hidden">
            <div class="menuHeader">
                <h2 class="menuHeaderText" id="editProjectHeaderText">Edit Project:</h2>
                <img class="smallIcon whiteIcon end pointer" id="closeEditProjectMenu" src="../src/assets/close.png"
                    alt="Close new task menu">
            </div>
            <form id="createProject">
                <label for="editProjectTitle">Project Name:</label>
                <input class="justifyLeft" type="text" name="title" id="editProjectTitle">
                <label for="editProjectDate">Due Date:</label>
                <input class="justifyLeft" type="date" name="date" id="editProjectDate">
                <label for="editProjectDescription">Project Description:</label>
                <input class="justifyLeft" type="text" name="descriptoin" id="editProjectDescription">
                <input type="submit" value="Create" class="button hoverButton">
            </form>
        </div>
        <div id="dueDateBar">
            <div class="pointer sideMenuSelections hoverButton" id="pastDue">
                <p>Past Due</p>

            </div>
            <div class="pointer sideMenuSelections hoverButton" id="dueToday">
                <p>Today</p>

            </div>
            <div id="dueTomorrow" class="pointer sideMenuSelections hoverButton">
                <p>Tomorrow</p>

            </div>
            <div id="dueThisWeek" class="pointer sideMenuSelections hoverButton">
                <p>This Week</p>

            </div>
            <div id="dueAll" class="pointer sideMenuSelections hoverButton">
                <p>All Tasks</p>

            </div>
        </div>
        <div class="taskContainer">
            
        </div>
    </main>
</body>

<script src="./main.js"></script>

</html>
